<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Structure</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
        }
        td {
            padding: 20px;
            border: 3px solid #ff7200;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <table style="width: 90%; border: 3px solid black;">

        <tr style="height: 90vh; border: 3px dashed black;">
            <table style="width: 90%;">
       
        
       
            
            <td style="width: 90%;">
                
                <table style="width: 80%;">

                    
                    
                        <td></td>
                    
                    
                
                </table>
            </td>
            
        
        
        </tr>

        <tr>
            
                <table style="width: 90%;">
                    <tr>
                        <td style="border: 3px solid #333; padding: 30px;">
                            
                            <br><br>
                            <table style="width: 85%; height: 40vh; margin: 20px auto; border: 3px solid #ff7200;">
                                <tr>
                                    <td style="padding: 25px;">
                                        
                                    </td>
                                </tr>
                            </table>
                            <br>
                            
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
           
        </tr>
        
    
    </table>

</body>
</html>
